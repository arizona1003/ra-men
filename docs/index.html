<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#D14836">
<title>ラーメンイキタイ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <!-- ==== タブコンテンツ ==== -->
  <main id="main">
    <!-- ホーム -->
    <section class="view" data-view="home">
      <div class="home-logo">
        <div class="logo-mark">ラーメン<br>イキタイ</div>
        <div class="logo-sub">RAMEN IKITAI</div>
      </div>

      <div class="home-top">
        <button class="home-search-btn" data-go="search">
          <span class="hs-ico">🔍</span>
          <span class="hs-label">ラーメン店を検索</span>
        </button>
        <div class="home-sub-grid">
          <button class="home-sub-btn" data-go="map">
            <span class="ico">📍</span> 地図から探す
          </button>
          <button class="home-sub-btn" data-go="ranking">
            <span class="ico">🏆</span> ランキング
          </button>
        </div>
        <p class="home-tag">全国<strong id="st-shops-top">0</strong>店舗のラーメンがあるよ</p>
        <div class="home-mascot">🍜 🍜</div>
      </div>

      <div class="home-promo">
        <div class="promo-title">ラーメンライフがもっと楽しくなる！</div>
        <div class="promo-icons">
          <div class="promo-ic"><div class="pic-circle">🔖</div><div class="pic-label">行きたい店を<br>かんたん保存</div></div>
          <div class="promo-ic"><div class="pic-circle">📝</div><div class="pic-label">ラー活で<br>ラーメン記録</div></div>
          <div class="promo-ic"><div class="pic-circle">🍜</div><div class="pic-label">全国の名店を<br>発見しよう</div></div>
        </div>
        <div class="hero-stats" style="margin-top:14px">
          <div class="stat"><strong id="st-shops">0</strong><span>店舗</span></div>
          <div class="stat"><strong id="st-reviews">0</strong><span>ラー活</span></div>
          <div class="stat"><strong id="st-wants">0</strong><span>行きたい</span></div>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title">ジャンルから探す</h3>
        <div id="genre-grid" class="genre-grid"></div>
      </div>

      <div class="section">
        <div class="section-head">
          <h3 class="section-title">人気急上昇<span class="cnt">🔥 TOP5</span></h3>
        </div>
        <div id="trending" class="shop-scroll"></div>
      </div>

      <div class="section">
        <div class="section-head">
          <h3 class="section-title">注目のラーメン店</h3>
          <button class="link-btn" data-go="ranking">ランキング →</button>
        </div>
        <div id="featured" class="shop-scroll"></div>
      </div>

      <div class="section">
        <div class="section-head">
          <h3 class="section-title">最新のラー活</h3>
          <button class="link-btn" data-go="feed">もっと見る →</button>
        </div>
        <div id="recent-activity" class="activity-list"></div>
      </div>
    </section>

    <!-- ラー活フィード -->
    <section class="view" data-view="feed" hidden>
      <header class="topbar"><h1>ラー活</h1></header>
      <div class="feed-tabs">
        <button class="tab active" data-feed="all">みんなのラー活</button>
        <button class="tab" data-feed="mine">自分のラー活</button>
      </div>
      <div id="feed-list" class="feed-list"></div>
    </section>

    <!-- 通知 -->
    <section class="view" data-view="notify" hidden>
      <header class="topbar"><h1>通知</h1></header>
      <div id="notify-list" class="notify-list"></div>
    </section>

    <!-- 地図 -->
    <section class="view" data-view="map" hidden>
      <header class="topbar"><h1>地図から探す</h1></header>
      <div id="map-wrap">
        <div id="leaflet-map"></div>
        <div id="map-shop-info" class="map-shop-info" hidden></div>
      </div>
    </section>

    <!-- 検索 -->
    <section class="view" data-view="search" hidden>
      <header class="topbar"><h1>検索</h1></header>
      <div class="search-controls">
        <input type="search" id="search-input" placeholder="店名・エリア・ジャンル" class="search-input">
        <div class="chip-row" id="chip-row"></div>
        <div class="filter-row">
          <label>
            <select id="sort-select">
              <option value="rating">評価順</option>
              <option value="reviews">ラー活が多い順</option>
              <option value="name">名前順</option>
            </select>
          </label>
          <label>
            <select id="pref-select"><option value="">すべてのエリア</option></select>
          </label>
          <label class="switch">
            <input type="checkbox" id="wants-only">
            <span>行きたいのみ</span>
          </label>
        </div>
      </div>
      <div id="search-results" class="result-list"></div>
    </section>

    <!-- ランキング -->
    <section class="view" data-view="ranking" hidden>
      <header class="topbar"><h1>ランキング</h1></header>
      <div class="tabs-scroll" id="ranking-tabs"></div>
      <ol id="ranking-list" class="ranking-list"></ol>
    </section>

    <!-- マイページ -->
    <section class="view" data-view="mypage" hidden>
      <header class="topbar"><h1>マイページ</h1></header>
      <div class="profile">
        <div class="avatar">🍜</div>
        <div class="profile-main">
          <div id="profile-name" class="profile-name">ラーメン好き</div>
          <div class="profile-stats">
            <div class="stat"><strong id="my-reviews">0</strong><span>ラー活</span></div>
            <div class="stat"><strong id="my-wants">0</strong><span>行きたい</span></div>
            <div class="stat"><strong id="my-avg">-</strong><span>平均</span></div>
          </div>
        </div>
      </div>
      <div class="tabs-scroll" id="mypage-tabs">
        <button class="tab active" data-my="reviews">ラー活履歴</button>
        <button class="tab" data-my="wants">行きたい</button>
        <button class="tab" data-my="settings">設定</button>
      </div>
      <div id="my-content"></div>
    </section>

    <!-- 店舗詳細 -->
    <section class="view" data-view="shop" hidden>
      <div id="shop-detail"></div>
    </section>
  </main>

  <!-- ==== タブバー（5タブ） ==== -->
  <nav class="tabbar tabbar-5">
    <button class="tab-item active" data-go="home">
      <span class="tab-ico">🏠</span><span class="tab-label">ホーム</span>
    </button>
    <button class="tab-item" data-go="feed">
      <span class="tab-ico">🍜</span><span class="tab-label">ラー活</span>
    </button>
    <button class="tab-item tab-post" data-post>
      <span class="tab-ico-post">＋</span><span class="tab-label">投稿</span>
    </button>
    <button class="tab-item" data-go="notify">
      <span class="tab-ico">🔔</span><span class="tab-label">通知</span>
      <span class="notify-dot" id="notify-dot" hidden></span>
    </button>
    <button class="tab-item" data-go="mypage">
      <span class="tab-ico">😊</span><span class="tab-label">マイ</span>
    </button>
  </nav>
</div>

<!-- ==== ラー活投稿モーダル ==== -->
<div class="modal" id="review-modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-panel">
    <div class="modal-head">
      <h2>ラー活を記録</h2>
      <button class="icon-btn" data-close aria-label="閉じる">✕</button>
    </div>
    <form id="review-form">
      <div class="shop-label" id="review-shop-label"></div>

      <label class="field">
        <span>訪問日</span>
        <input type="date" name="visitedAt" required>
      </label>

      <label class="field">
        <span>注文したメニュー</span>
        <input type="text" name="menu" placeholder="例：特製醤油ラーメン" required>
      </label>

      <div class="field">
        <span>総合評価</span>
        <div class="star-picker" id="star-picker">
          <button type="button" data-rate="1">★</button>
          <button type="button" data-rate="2">★</button>
          <button type="button" data-rate="3">★</button>
          <button type="button" data-rate="4">★</button>
          <button type="button" data-rate="5">★</button>
        </div>
        <input type="hidden" name="rating" value="4">
      </div>

      <div class="field-grid">
        <label><span>スープ</span>
          <select name="soup"><option>5</option><option>4</option><option selected>3</option><option>2</option><option>1</option></select>
        </label>
        <label><span>麺</span>
          <select name="noodle"><option>5</option><option>4</option><option selected>3</option><option>2</option><option>1</option></select>
        </label>
        <label><span>具</span>
          <select name="topping"><option>5</option><option>4</option><option selected>3</option><option>2</option><option>1</option></select>
        </label>
      </div>

      <div class="field">
        <span>写真（最大4枚）</span>
        <div class="photo-row" id="photo-row">
          <label class="photo-add">
            <input type="file" accept="image/*" multiple id="photo-input" hidden>
            <span>＋</span>
            <em>追加</em>
          </label>
        </div>
      </div>

      <label class="field">
        <span>感想</span>
        <textarea name="comment" rows="4" placeholder="スープの味わい、麺の硬さ、お店の雰囲気など"></textarea>
      </label>

      <div class="form-actions">
        <button type="button" class="btn ghost" data-close>キャンセル</button>
        <button type="submit" class="btn primary">投稿する</button>
      </div>
    </form>
  </div>
</div>

<!-- ==== 店舗ピッカーモーダル（投稿タブから） ==== -->
<div class="modal" id="picker-modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-panel">
    <div class="modal-head">
      <h2>どのお店でラー活？</h2>
      <button class="icon-btn" data-close aria-label="閉じる">✕</button>
    </div>
    <input type="search" id="picker-input" placeholder="店名で探す" class="search-input" style="margin-bottom:12px">
    <div id="picker-list" class="picker-list"></div>
  </div>
</div>

<!-- ==== 写真ビューア ==== -->
<div class="viewer" id="photo-viewer" hidden>
  <button class="viewer-close" data-close aria-label="閉じる">✕</button>
  <img id="viewer-image" alt="">
  <div class="viewer-pager" id="viewer-pager"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
