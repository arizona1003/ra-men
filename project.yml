name: RamenIkitai
options:
  bundleIdPrefix: com.ramenikitai
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  RamenIkitai:
    type: application
    platform: iOS
    sources:
      - path: RamenIkitai
        excludes:
          - "Info.plist"
    resources:
      - RamenIkitai/Assets.xcassets
    info:
      path: RamenIkitai/Info.plist
      properties:
        CFBundleDisplayName: ラーメンイキタイ
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ramenikitai.app
        PRODUCT_NAME: RamenIkitai
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: RamenIkitai/Info.plist
        SWIFT_EMIT_LOC_STRINGS: "YES"
